on:
  workflow_call:
    inputs:
      docker-repo-name:
        required: true
        type: string
      docker-tag:
        required: true
        type: string
      docker-context:
        required: true
        type: string
      docker-file:
        required: true
        type: string
      docker-hub-username:
        required: true
        type: string
      docker-build-args:
        required: false
        type: string
      push:
        required: true
        type: boolean
      trivy-ignore-files:
        required: false
        type: string
        default: ".trivyignore"
      docker-extra-tags:
        required: false
        type: string
        default: ""
      build-date-tag:
        required: false
        type: boolean
        default: false
        description: "When true, additionally publish an immutable <docker-tag>-<YYYYMMDD> tag."
      smoke-test-port:
        required: false
        type: string
        default: ""
        description: "Port number to expose (host and container port will be identical, e.g. '9200')"
      smoke-test-url:
        required: false
        type: string
        default: ""
        description: "URL to poll for HTTP 200 after starting the container. When empty, the smoke test step is skipped."
      smoke-test-env:
        required: false
        type: string
        default: ""
        description: "Newline-separated list of KEY=VALUE pairs passed as --env to docker run."
      smoke-test-entrypoint-cmd:
        required: false
        type: string
        default: ""
        description: "Override entrypoint to /bin/sh -c '<cmd>'. Must end with a long-running process (e.g. via exec) so the container stays alive for polling."
      smoke-test-version-jq:
        required: false
        type: string
        default: ""
        description: "jq expression applied to the JSON response from smoke-test-url; result must equal docker-tag."
      smoke-test-cmd:
        required: false
        type: string
        default: ""
        description: "Shell command to run inside the container as a one-shot smoke test (for non-server images). Skipped when empty."
      docker-cache-from:
        required: false
        type: string
        default: ""
        description: "BuildKit cache-from value passed to docker/build-push-action (e.g. 'type=gha')."
      docker-cache-to:
        required: false
        type: string
        default: ""
        description: "BuildKit cache-to value passed to docker/build-push-action (e.g. 'type=gha,mode=max')."
    secrets:
      docker-hub-password:
        required: true
      docker-secrets:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:3
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          driver-opts: network=host

      - name: Build Docker Image
        id: docker-build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.docker-file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: 127.0.0.1:5000/image:temp
          secrets: ${{ secrets.docker-secrets }}
          build-args: ${{ inputs.docker-build-args }}
          cache-from: ${{ inputs.docker-cache-from }}
          cache-to: ${{ inputs.docker-cache-to }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 127.0.0.1:5000/image:temp
          hide-progress: true
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-files: /usr/bin/gomplate,/usr/bin/wait-for
          exit-code: 1
          trivyignores: ${{ inputs.trivy-ignore-files }}

      # smoke-test-entrypoint-cmd is an entrypoint override: the command must end with
      # a long-running process (e.g. via exec) so the container stays alive for polling.
      # Example for oCIS: "ocis init || true; exec ocis server"
      - name: Smoke test
        if: ${{ inputs.smoke-test-url != '' }}
        env:
          SMOKE_PORT: ${{ inputs.smoke-test-port }}
          SMOKE_URL: ${{ inputs.smoke-test-url }}
          SMOKE_ENV: ${{ inputs.smoke-test-env }}
          SMOKE_ENTRYPOINT_CMD: ${{ inputs.smoke-test-entrypoint-cmd }}
          SMOKE_VERSION_JQ: ${{ inputs.smoke-test-version-jq }}
          DOCKER_TAG: ${{ inputs.docker-tag }}
        run: |
          ARGS=(--rm -d)
          [ -n "${SMOKE_PORT}" ] && ARGS+=(-p "${SMOKE_PORT}:${SMOKE_PORT}")
          if [ -n "${SMOKE_ENV}" ]; then
            while IFS= read -r line; do
              [ -n "$line" ] && ARGS+=(--env "${line}")
            done <<< "${SMOKE_ENV}"
          fi
          if [ -n "${SMOKE_ENTRYPOINT_CMD}" ]; then
            CID=$(docker run "${ARGS[@]}" --entrypoint /bin/sh 127.0.0.1:5000/image:temp -c "${SMOKE_ENTRYPOINT_CMD}")
          else
            CID=$(docker run "${ARGS[@]}" 127.0.0.1:5000/image:temp)
          fi
          [ -z "${CID}" ] && { echo "docker run failed to start"; exit 1; }
          trap "docker stop ${CID} > /dev/null" EXIT
          echo "Container started: ${CID}"
          echo "Polling ${SMOKE_URL} ..."
          STATUS=""
          ELAPSED=0
          for i in $(seq 1 31); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "${SMOKE_URL}") || STATUS="000"
            if [ "${STATUS}" = "200" ]; then
              echo "Got HTTP 200 after ${ELAPSED}s"
              break
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
          done
          if [ "${STATUS}" != "200" ]; then
            echo "Timed out after 60s waiting for HTTP 200 (last status: ${STATUS})"
            docker logs "${CID}"
            exit 1
          fi
          if [ -n "${SMOKE_VERSION_JQ}" ]; then
            ACTUAL=$(curl -sk "${SMOKE_URL}" | jq -r "${SMOKE_VERSION_JQ}")
            if [ "${ACTUAL}" != "${DOCKER_TAG}" ]; then
              echo "Version mismatch: expected '${DOCKER_TAG}', got '${ACTUAL}'"
              exit 1
            fi
            echo "Version verified: ${ACTUAL}"
          fi

      # smoke-test-cmd and smoke-test-url are independent guards — both steps run if both inputs are set.
      - name: Smoke test (cmd)
        if: ${{ inputs.smoke-test-cmd != '' }}
        env:
          SMOKE_CMD: ${{ inputs.smoke-test-cmd }}
        run: |
          docker run --rm --entrypoint /bin/sh 127.0.0.1:5000/image:temp -c "${SMOKE_CMD}"

      - name: Set publish tags
        if: ${{ inputs.push }}
        id: tags
        env:
          DOCKER_REPO_NAME: ${{ inputs.docker-repo-name }}
          DOCKER_TAG: ${{ inputs.docker-tag }}
          DOCKER_EXTRA_TAGS: ${{ inputs.docker-extra-tags }}
          BUILD_DATE_TAG: ${{ inputs.build-date-tag }}
        run: |
          TAGS="${DOCKER_REPO_NAME}:${DOCKER_TAG}"
          if [ -n "${DOCKER_EXTRA_TAGS}" ]; then
            while IFS= read -r tag; do
              [ -n "$tag" ] && TAGS="${TAGS}"$'\n'"${DOCKER_REPO_NAME}:${tag}"
            done <<< "${DOCKER_EXTRA_TAGS}"
          fi
          if [ "${BUILD_DATE_TAG}" = "true" ]; then
            TAGS="${TAGS}"$'\n'"${DOCKER_REPO_NAME}:${DOCKER_TAG}-$(date -u +%Y%m%d)"
          fi
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Push the image on merge to master
      - name: Login to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          username: ${{ inputs.docker-hub-username }}
          password: ${{ secrets.docker-hub-password }}

      - name: Publish image
        if: ${{ inputs.push }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.docker-file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.list }}
          secrets: ${{ secrets.docker-secrets }}
          build-args: ${{ inputs.docker-build-args }}
          cache-from: ${{ inputs.docker-cache-from }}
