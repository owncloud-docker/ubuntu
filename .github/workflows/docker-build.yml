on:
  workflow_call:
    inputs:
      docker-repo-name:
        required: true
        type: string
      docker-tag:
        required: true
        type: string
      docker-context:
        required: true
        type: string
      docker-file:
        required: true
        type: string
      docker-hub-username:
        required: true
        type: string
      docker-build-args:
        required: false
        type: string
      push:
        required: true
        type: boolean
      trivy-ignore-files:
        required: false
        type: string
        default: ".trivyignore"
      docker-extra-tags:
        required: false
        type: string
        default: ""
      orca-security-project-key:
        required: true
        type: string
    secrets:
      docker-hub-password:
        required: true
      docker-secrets:
        required: false
      orca-security-api-token:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      registry:
        image: registry:3
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver-opts: network=host

      - name: Build Docker Image
        id: docker-build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.docker-file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: 127.0.0.1:5000/image:temp
          secrets: ${{ secrets.docker-secrets }}
          build-args: ${{ inputs.docker-build-args }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 127.0.0.1:5000/image:temp
          hide-progress: true
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-files: /usr/bin/gomplate,/usr/bin/wait-for
          exit-code: 1
          trivyignores: ${{ inputs.trivy-ignore-files }}

      - name: Orca Security scan
        uses: orcasecurity/shiftleft-container-image-action@9cceca839ca144e6bb160a1d974d0656bcf71f22 # v1.0.6
        with:
          api_token: ${{ secrets.orca-security-api-token }}
          project_key: ${{ inputs.orca-security-project-key }}
          image: registry:5000/image:temp
          exit_code: "1"

      - name: Set publish tags
        if: ${{ inputs.push }}
        id: tags
        env:
          DOCKER_REPO_NAME: ${{ inputs.docker-repo-name }}
          DOCKER_TAG: ${{ inputs.docker-tag }}
          DOCKER_EXTRA_TAGS: ${{ inputs.docker-extra-tags }}
        run: |
          TAGS="${DOCKER_REPO_NAME}:${DOCKER_TAG}"
          if [ -n "${DOCKER_EXTRA_TAGS}" ]; then
            while IFS= read -r tag; do
              [ -n "$tag" ] && TAGS="${TAGS}"$'\n'"${DOCKER_REPO_NAME}:${tag}"
            done <<< "${DOCKER_EXTRA_TAGS}"
          fi
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Push the image on merge to master
      - name: Login to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ inputs.docker-hub-username }}
          password: ${{ secrets.docker-hub-password }}

      - name: Publish image
        if: ${{ inputs.push }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.docker-file }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.list }}
          secrets: ${{ secrets.docker-secrets }}
          build-args: ${{ inputs.docker-build-args }}
