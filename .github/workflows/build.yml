name: Docker CI

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:

env:
  IMAGE_NAME: owncloud/${{ github.event.repository.name }}
  DESCRIPTION: ownCloud Ubuntu base image

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: editorconfig-checker/action-editorconfig-checker@840e866d93b8e032123c23bac69dece044d4d84c

      - run: editorconfig-checker

  build:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          - value: "24.04"
          - value: "22.04"
          - value: "20.04"

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
        with:
          driver-opts: network=host

      - name: Build and push
        id: docker-build
        uses: docker/build-push-action@b66d8774c665b789105b440514f0c97e6f19b06f
        with:
          context: v${{ matrix.version.value }}
          file: v${{ matrix.version.value }}/Dockerfile.multiarch
          push: true
          platforms: linux/amd64,linux/arm64
          tags: 127.0.0.1:5000/image:temp

      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: 127.0.0.1:5000/image:temp
          hide-progress: true
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-files: /usr/bin/gomplate,/usr/bin/wait-for

      # Push the image on merge to master
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish image
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@b66d8774c665b789105b440514f0c97e6f19b06f
        with:
          context: v${{ matrix.version.value }}
          file: v${{ matrix.version.value }}/Dockerfile.multiarch
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_NAME }}:${{ matrix.version.value }}

  documentation:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: tcort/github-action-markdown-link-check@e7c7a18363c842693fadde5d41a3bd3573a7a225
        with:
          file-path: 'README.md'

      - uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: ${{ env.DESCRIPTION }}
